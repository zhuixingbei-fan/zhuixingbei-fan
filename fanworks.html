<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        body { background: #0B1120; color: #eef; font-family: system-ui; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        h1 { color: #FFB347; text-align: center; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .card {
            background: #1A1E2A;
            border-radius: 1.5rem;
            padding: 1rem;
            transition: 0.2s;
        }
        .card iframe {
            width: 100%;
            height: 180px;
            border-radius: 1rem;
        }
        .card a {
            color: #FFB347;
            text-decoration: none;
            font-weight: bold;
        }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: #FFB347;
        }
    </style>
</head>
<body>

    <div class="gallery">
        <!-- 每个卡片可以是一个二创视频或图片集 -->
