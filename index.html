<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坠猩杯 · 粉丝档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }
        .poster {
            text-align: center;
            animation: fadeInUp 1.2s ease-out;
        }
        h1 {
            font-size: 5rem;
            background: linear-gradient(135deg, #FFB347, #FF6F00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255,111,0,0.3);
        }
        .sub {
            font-size: 1.2rem;
            color: #cbd5e6;
            margin-top: 1rem;
            letter-spacing: 2px;
        }
        .enter-hint {
            position: absolute;
            bottom: 10%;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff8c42;
            font-size: 0.9rem;
            animation: bounce 1.5s infinite;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }
        /* 背景光晕 */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,111,0,0.2), transparent);
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
        }
        .glow1 { top: 20%; left: 10%; }
        .glow2 { bottom: 20%; right: 10%; }
    </style>
</head>
<body onclick="location.href='host.html';">
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
    <div class="poster">
        <h1>🦍 坠猩杯 · 档案馆 🥚</h1>
        <div class="sub">所有狂欢，在此永存</div>
        <div class="enter-hint">↓ 点击任意处进入 ↓</div>
    </div>
</body>
</html>
