<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坠猩杯 · 粉丝档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            height: 100vh;
            /* 背景图：你上传的图片，铺满全屏，不重复，居中 */
            background-image: url('1000016890.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* 取消模糊，没有任何filter */
            cursor: pointer;
            overflow: hidden;
        }
        .poster {
            text-align: center;
            animation: fadeInUp 1.2s ease-out;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 可选：给文字一个微弱的阴影，避免在亮色背景上看不清 */
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 5rem;
            background: linear-gradient(135deg, #FFB347, #FF6F00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
        }
        .sub {
            font-size: 1.2rem;
            color: #fff8f0;
            margin-top: 1rem;
            letter-spacing: 2px;
            font-weight: 500;
        }
        .enter-hint {
            position: absolute;
            bottom: 10%;
            left: 0;
            right: 0;
            text-align: center;
            color: #ffffff;
            font-size: 0.9rem;
            animation: bounce 1.5s infinite;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            width: fit-content;
            margin: 0 auto;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px); /* 仅给这个小按钮一点点毛玻璃，不是背景模糊 */
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }
        @media (max-width: 700px) {
            h1 { font-size: 2.5rem; }
            .sub { font-size: 0.9rem; }
        }
    </style>
</head>
<body onclick="location.href='host.html';">
    <div class="poster">
        <h1>🦍 坠猩杯 · 档案馆 🥚</h1>
        <div class="sub">所有狂欢，在此永存</div>
        <div class="enter-hint">↓ 点击任意处进入 ↓</div>
    </div>
</body>
</html>
