<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坠猩杯 · 粉丝档案馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            height: 100vh;
            /* 背景图：你上传的图片 */
            background-image: url('1000016890.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* 虚化效果：对背景图本身进行模糊 */
            backdrop-filter: blur(8px);  /* 这里的数值越大越模糊 */
            /* 为了确保背景图覆盖整个页面，同时文字不被虚化，需要加一层半透明层 */
            position: relative;
        }
        /* 增加一个半透明黑色层，提高文字可读性（可选项，不想要可以删掉） */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);  /* 半透明黑色，数值越大越暗 */
            z-index: 1;
        }
        .poster {
            text-align: center;
            animation: fadeInUp 1.2s ease-out;
            position: relative;
            z-index: 2;  /* 让文字浮在遮罩层之上 */
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 5rem;
            background: linear-gradient(135deg, #FFB347, #FF6F00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255,111,0,0.3);
        }
        .sub {
            font-size: 1.2rem;
            color: #f0f0f0;
            margin-top: 1rem;
            letter-spacing: 2px;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .enter-hint {
            position: absolute;
            bottom: 10%;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff8c42;
            font-size: 0.9rem;
            animation: bounce 1.5s infinite;
            text-shadow: 0 0 2px #000;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }
        /* 可选：移动端适配 */
        @media (max-width: 700px) {
            h1 { font-size: 2.5rem; }
            .sub { font-size: 0.9rem; }
        }
    </style>
</head>
<body onclick="location.href='host.html';">
    <div class="poster">
        <h1>🦍 坠猩杯 · 档案馆 🥚</h1>
        <div class="sub">所有狂欢，在此永存</div>
        <div class="enter-hint">↓ 点击任意处进入 ↓</div>
    </div>
</body>
</html>
