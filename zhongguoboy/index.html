<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>猩仔联盟 · 坠猩杯档案馆</title>
    <style>
        body { background: #0B1120; color: #e2e4e9; font-family: system-ui; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: #FFB347; }
        .back { display: inline-block; margin: 1rem 0; color: #FFB347; text-decoration: none; }
        .team-section {
            margin-bottom: 2.5rem;
            background: #0f172a;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }
        .team-title {
            font-size: 1.5rem;
            color: #FFD966;
            border-left: 5px solid #FF6F00;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
        }
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.2rem;
        }
        .player-card {
            background: #1A1E2A;
            border-radius: 1.2rem;
            padding: 0.8rem;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid #2A2F3F;
        }
        .player-card:hover {
            transform: translateY(-5px);
            border-color: #FF6F00;
            background: #202536;
        }
        .player-avatar {
            width: 80px;
            height: 80px;
            background: #2a2f3f;
            border-radius: 50%;
            margin: 0 auto 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .player-name {
            font-size: 1rem;
            font-weight: bold;
            color: #FFD966;
        }
        footer { text-align: center; margin-top: 2rem; color: #6c7080; font-size: 0.8rem; }
        @media (max-width: 640px) {
            .player-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .player-avatar { width: 60px; height: 60px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="../host.html" class="back">← 返回阵营选择</a>
    <header>
        <h1>🦍 猩仔联盟</h1>
        <p>主理人：中国boy</p>
    </header>

    <!-- 主理人 -->
    <div class="team-section">
        <div class="team-title">👑 主理人</div>
        <div class="player-grid">
            <div class="player-card" onclick="location.href='players/zhongguoboy.html';">
                <div class="player-avatar">🇨🇳</div>
                <div class="player-name">中国boy</div>
            </div>
        </div>
    </div>

    <!-- 队伍成员 -->
    <div class="team-section">
        <div class="team-title">✨ 队伍成员</div>
        <div class="player-grid">
            <div class="player-card" onclick="location.href='players/liuxuanfeng.html';">
                <div class="player-avatar">💨</div>
                <div class="player-name">刘旋风</div>
            </div>
            <div class="player-card" onclick="location.href='players/ykk.html';">
                <div class="player-avatar">🔥</div>
                <div class="player-name">ykk</div>
            </div>
            <div class="player-card" onclick="location.href='players/lengmoxingxing.html';">
                <div class="player-avatar">❄️</div>
                <div class="player-name">冷漠星星</div>
            </div>
            <div class="player-card" onclick="location.href='players/sinanaiyowei.html';">
                <div class="player-avatar">🎯</div>
                <div class="player-name">司南诶哟喂</div>
            </div>
            <div class="player-card" onclick="location.href='players/niheshuishuima.html';">
                <div class="player-avatar">💧</div>
                <div class="player-name">你喝水水麻</div>
            </div>
            <div class="player-card" onclick="location.href='players/gaga.html';">
                <div class="player-avatar">⭐</div>
                <div class="player-name">gaga</div>
            </div>
            <div class="player-card" onclick="location.href='players/linqingxuan.html';">
                <div class="player-avatar">🌀</div>
                <div class="player-name">临清玄</div>
            </div>
            <div class="player-card" onclick="location.href='players/shengyougui.html';">
                <div class="player-avatar">🎤</div>
                <div class="player-name">声优鬼</div>
            </div>
        </div>
    </div>

    <footer>点击头像查看选手个人录屏 & 二创</footer>
</div>
</body>
</html>
