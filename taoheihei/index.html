<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>胖蛋军团 · 坠猩杯档案馆</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { background: #0B1120; color: #e2e4e9; font-family: system-ui; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: #FFB347; }
        .back { display: inline-block; margin: 1rem 0; color: #FFB347; text-decoration: none; }
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .player-card {
            background: #1A1E2A;
            border-radius: 1.5rem;
            padding: 1rem;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid #2A2F3F;
        }
        .player-card:hover {
            transform: translateY(-5px);
            border-color: #FF6F00;
            background: #202536;
        }
        .player-avatar {
            width: 100px;
            height: 100px;
            background: #2a2f3f;
            border-radius: 50%;
            margin: 0 auto 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFD966;
        }
        footer { text-align: center; margin-top: 3rem; color: #6c7080; }
    </style>
</head>
<body>
<div class="container">
    <a href="../host.html" class="back">← 返回阵营选择</a>
    <header>
        <h1>🍑 胖蛋军团</h1>
        <p>主理人：桃黑黑</p>
    </header>
    <div class="player-grid">
        <!-- 每个卡片点击后跳转到对应的选手页面 -->
        <div class="player-card" onclick="location.href='players/pupu.html';">
            <div class="player-avatar">🐣</div>
            <div class="player-name">普普</div>
        </div>
        <div class="player-card" onclick="location.href='players/woduzidan.html';">
            <div class="player-avatar">🥚</div>
            <div class="player-name">我肚子蛋</div>
        </div>
        <div class="player-card" onclick="location.href='players/taomixicai.html';">
            <div class="player-avatar">🧼</div>
            <div class="player-name">淘米洗菜</div>
        </div>
        <div class="player-card" onclick="location.href='players/laolan.html';">
            <div class="player-avatar">🛡️</div>
            <div class="player-name">老兰</div>
        </div>
        <div class="player-card" onclick="location.href='players/caibaodududu.html';">
            <div class="player-avatar">🥬</div>
            <div class="player-name">菜包嘟嘟嘟</div>
        </div>
        <div class="player-card" onclick="location.href='players/wukui.html';">
            <div class="player-avatar">🌻</div>
            <div class="player-name">午葵</div>
        </div>
        <div class="player-card" onclick="location.href='players/heimapao.html';">
            <div class="player-avatar">🐗</div>
            <div class="player-name">黑猪快跑</div>
        </div>
        <div class="player-card" onclick="location.href='players/maomao.html';">
            <div class="player-avatar">🐱</div>
            <div class="player-name">猫猫猫猫猫</div>
        </div>
        <div class="player-card" onclick="location.href='players/aimu.html';">
            <div class="player-avatar">💕</div>
            <div class="player-name">爱慕</div>
        </div>
    </div>
    <footer>点击头像查看选手个人录屏 & 二创</footer>
</div>
</body>
</html>
